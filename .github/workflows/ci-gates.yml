name: ci-gates

on:
  pull_request:
  push:
    branches: [main, dev_v3]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Business Rules (unit)
        run: npm run test:regles

      - name: Isolation (when DATABASE_URL provided)
        if: ${{ secrets.DATABASE_URL != '' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ADMIN_DATABASE_URL: ${{ secrets.ADMIN_DATABASE_URL }}
        run: npm run test:isolation

      - name: Authz Matrix
        run: npm run test:authz

      - name: Security Smoke
        run: npm run test:security:smoke
