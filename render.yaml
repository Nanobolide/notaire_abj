databases:
  - name: notariat
    plan: free
    databaseName: notariat
    user: notariat_user

services:
  - type: web
    name: notaire-abj
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: notariat
          property: connectionString
