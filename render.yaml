# Render — déploiement Web Service (plan Free)
# https://dashboard.render.com/ → New → Blueprint ou Web Service
services:
  - type: web
    name: notaire-abj
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: data/notaria.db
      - key: JWT_SECRET
        generateValue: true
